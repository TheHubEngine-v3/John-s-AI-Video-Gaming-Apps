```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArenaForge</title>
    <style>
        body {
            background-color: #0c0f1a;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }
        .card {
            background-color: #131726;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .teal {
            color: #00d4aa;
        }
        .button {
            background-color: #00d4aa;
            color: #ffffff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #009787;
        }
    </style>
</head>
<body>
    <div class="card" id="home-screen">
        <h1>Discover</h1>
        <div id="trending-games">
            <!-- Trending games carousel/list -->
        </div>
        <button class="button" id="create-new-game">Create New Game</button>
        <img id="profile-icon" src="" alt="Profile Icon">
    </div>
    <div class="card" id="studio-screen" style="display: none;">
        <h1>Studio</h1>
        <div id="no-code-editor">
            <!-- No-code editor: drag-drop blocks -->
        </div>
        <button class="button" id="publish-game">Publish</button>
    </div>
    <div class="card" id="lobby-screen" style="display: none;">
        <h1>Lobby</h1>
        <div id="player-list">
            <!-- Player list: sim 4 players -->
        </div>
        <button class="button" id="ready-countdown">Ready</button>
        <div id="anti-cheat-indicator">
            <!-- Anti-cheat indicator -->
        </div>
    </div>
    <div class="card" id="play-screen" style="display: none;">
        <h1>Play</h1>
        <div id="pvp-view">
            <!-- Simulated PvP view: health bars, timer -->
        </div>
        <div id="victory-modal" style="display: none;">
            <h2>Victory!</h2>
            <p>XP: <span id="xp"></span></p>
            <p>Coins: <span id="coins"></span></p>
            <button class="button" id="share-clip">Share Clip</button>
        </div>
    </div>
    <div class="card" id="profile-screen" style="display: none;">
        <h1>Profile</h1>
        <p>Wins: <span id="wins"></span></p>
        <p>Stats: <span id="stats"></span></p>
        <p>Limits: <span id="limits"></span></p>
        <button class="button" id="premium-upgrade">Upgrade to Premium</button>
    </div>
    <div class="card" id="premium-screen" style="display: none;">
        <h1>Premium</h1>
        <ul id="benefits-list">
            <!-- Benefits list -->
        </ul>
        <button class="button" id="subscribe">Subscribe</button>
    </div>

    <script>
        let currentScreen = 'home-screen';
        let games = [];
        let profiles = {};
        let premiumBenefits = [];
        let subscriptionStatus = false;

        // Initialize localStorage
        if (localStorage.getItem('games') === null) {
            localStorage.setItem('games', JSON.stringify(games));
        }
        if (localStorage.getItem('profiles') === null) {
            localStorage.setItem('profiles', JSON.stringify(profiles));
        }
        if (localStorage.getItem('premiumBenefits') === null) {
            localStorage.setItem('premiumBenefits', JSON.stringify(premiumBenefits));
        }
        if (localStorage.getItem('subscriptionStatus') === null) {
            localStorage.setItem('subscriptionStatus', subscriptionStatus);
        }

        // Load data from localStorage
        games = JSON.parse(localStorage.getItem('games'));
        profiles = JSON.parse(localStorage.getItem('profiles'));
        premiumBenefits = JSON.parse(localStorage.getItem('premiumBenefits'));
        subscriptionStatus = JSON.parse(localStorage.getItem('subscriptionStatus'));

        // Create New Game button click event
        document.getElementById('create-new-game').addEventListener('click', () => {
            currentScreen = 'studio-screen';
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('studio-screen').style.display = 'block';
        });

        // Publish Game button click event
        document.getElementById('publish-game').addEventListener('click', () => {
            // Publish game logic
            currentScreen = 'lobby-screen';
            document.getElementById('studio-screen').style.display = 'none';
            document.getElementById('lobby-screen').style.display = 'block';
        });

        // Ready button click event
        document.getElementById('ready-countdown').addEventListener('click', () => {
            // Ready countdown logic
            currentScreen = 'play-screen';
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('play-screen').style.display = 'block';
        });

        // Share Clip button click event
        document.getElementById('share-clip').addEventListener('click', () => {
            // Share clip logic
        });

        // Upgrade to Premium button click event
        document.getElementById('premium-upgrade').addEventListener('click', () => {
            currentScreen = 'premium-screen';
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('premium-screen').style.display = 'block';
        });

        // Subscribe button click event
        document.getElementById('subscribe').addEventListener('click', () => {
            // Subscribe logic
            subscriptionStatus = true;
            localStorage.setItem('subscriptionStatus', subscriptionStatus);
        });

        // Navigation
        function navigateTo(screen) {
            currentScreen = screen;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('studio-screen').style.display = 'none';
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('play-screen').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('premium-screen').style.display = 'none';
            document.getElementById(screen).style.display = 'block';
        }
    </script>
</body>
</html>
